data:
  raw_path: data/raw/windows7_dataset.csv
  target_column: label 
  test_size: 0.2
  random_state: 42
  drop_columns: []

model:
  type: lightgbm
  task: multiclass
  parameters:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: -1
    random_state: 42

output:
  model_path: reports/model.joblib
  metrics_path: reports/metrics.json
  predictions_path: reports/predictions.csv
  confusion_matrix_path: reports/figures/confusion_matrix.png
